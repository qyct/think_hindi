<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think Hindi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #ede8df;
            --card:         #f8f4ee;
            --surface:      #f0ebe1;
            --surface-2:    #e8e1d4;
            --ink:          #1c1814;
            --ink-60:       rgba(28,24,20,0.60);
            --ink-35:       rgba(28,24,20,0.35);
            --ink-15:       rgba(28,24,20,0.15);
            --ink-08:       rgba(28,24,20,0.08);
            --accent:       #9b4a1f;
            --accent-light: rgba(155,74,31,0.08);
            --accent-mid:   rgba(155,74,31,0.18);
            --success:      #2e6e4a;
            --error:        #a83232;
            --r:            8px;
            --r-lg:         14px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border: 1px solid var(--ink-15);
            border-radius: var(--r-lg);
            overflow: hidden;
            box-shadow:
                0 0 0 0.5px rgba(28,24,20,0.06),
                0 4px 12px rgba(28,24,20,0.07),
                0 20px 48px rgba(28,24,20,0.08);
        }

        /* Header */
        .header {
            padding: 24px 28px 22px;
            border-bottom: 1px solid var(--ink-08);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
        }

        .header-title {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--ink);
            line-height: 1;
            letter-spacing: -0.01em;
        }

        .header-sub {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.78rem;
            color: var(--accent);
            margin-top: 6px;
        }

        .badge {
            font-size: 0.62rem;
            color: var(--ink-35);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            white-space: nowrap;
            padding-bottom: 2px;
        }

        /* Controls — 3-col grid: spinner | spinner | draw button */
        .controls {
            padding: 18px 28px;
            border-bottom: 1px solid var(--ink-08);
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: stretch;
        }

        /* Spinner field */
        .spinner {
            background: var(--surface);
            border: 1px solid var(--ink-15);
            border-radius: var(--r);
            height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 36px 0 14px;
            position: relative;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .spinner:focus-within {
            border-color: var(--accent-mid);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .spinner label {
            display: block;
            font-size: 0.57rem;
            font-weight: 500;
            color: var(--ink-35);
            letter-spacing: 0.11em;
            text-transform: uppercase;
            margin-bottom: 3px;
            user-select: none;
            cursor: default;
        }

        .spinner input[type="number"] {
            background: transparent;
            border: none;
            outline: none;
            font-family: 'DM Mono', monospace;
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--ink);
            width: 100%;
            line-height: 1;
        }

        .spinner input::-webkit-inner-spin-button,
        .spinner input::-webkit-outer-spin-button { display: none; }

        /* Stepper arrows on right edge of spinner */
        .stepper {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 30px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--ink-08);
            border-radius: 0 var(--r) var(--r) 0;
            overflow: hidden;
        }

        .step-btn {
            flex: 1;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-35);
            transition: background 0.12s, color 0.12s;
            padding: 0;
            height: auto;
            border-radius: 0;
            letter-spacing: 0;
            font-size: 0;
        }

        .step-btn:hover { background: var(--surface-2); color: var(--ink); }
        .step-btn:first-child { border-bottom: 1px solid var(--ink-08); }

        .step-btn svg { width: 9px; height: 9px; }

        /* Draw button */
        .btn-draw {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.07em;
            background: var(--ink);
            color: var(--card);
            border: none;
            border-radius: var(--r);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 0 20px;
            height: 52px;
            white-space: nowrap;
            transition: background 0.15s, box-shadow 0.15s, transform 0.12s;
        }

        .btn-draw:hover {
            background: #2a2420;
            box-shadow: 0 4px 14px rgba(28,24,20,0.22);
            transform: translateY(-1px);
        }

        .btn-draw:active { transform: none; box-shadow: none; }
        .btn-draw svg { width: 13px; height: 13px; flex-shrink: 0; }

        /* Words strip */
        .words-wrap { padding: 0 28px; }

        .words-strip {
            background: var(--surface);
            border: 1px solid var(--ink-15);
            border-radius: var(--r);
            height: 56px;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .words-strip.active { border-color: var(--accent-mid); }

        .words-inner {
            padding: 0 16px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-mid) transparent;
        }

        .words-inner::-webkit-scrollbar { height: 2px; }
        .words-inner::-webkit-scrollbar-thumb { background: var(--accent-mid); border-radius: 2px; }

        .words-fade {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 48px;
            background: linear-gradient(to right, transparent, var(--surface));
            pointer-events: none;
        }

        .words-strip.active .words-fade {
            background: linear-gradient(to right, transparent, #eee7db);
        }

        .words-text {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            color: var(--ink);
            white-space: nowrap;
            padding-right: 48px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .words-placeholder {
            font-size: 0.64rem;
            color: var(--ink-35);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: block;
            text-align: center;
            width: 100%;
        }

        .words-error {
            font-size: 0.7rem;
            color: var(--error);
            display: block;
            text-align: center;
            width: 100%;
        }

        /* Prompt section */
        .prompt-section { padding: 16px 28px 24px; }

        .prompt-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .prompt-label {
            font-size: 0.58rem;
            font-weight: 500;
            color: var(--ink-35);
            letter-spacing: 0.11em;
            text-transform: uppercase;
        }

        .prompt-hint {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.74rem;
            color: var(--ink-35);
        }

        #promptText {
            width: 100%;
            height: 122px;
            background: var(--surface);
            border: 1px solid var(--ink-15);
            border-radius: var(--r);
            padding: 12px 14px;
            font-family: 'DM Mono', monospace;
            font-size: 0.74rem;
            line-height: 1.78;
            color: var(--ink);
            resize: none;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            scrollbar-width: thin;
            scrollbar-color: var(--ink-15) transparent;
        }

        #promptText:focus {
            border-color: var(--accent-mid);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        #promptText::placeholder { color: var(--ink-35); font-style: italic; }
        #promptText::-webkit-scrollbar { width: 3px; }
        #promptText::-webkit-scrollbar-thumb { background: var(--ink-15); border-radius: 2px; }

        /* Copy row */
        .copy-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: flex-end;
        }

        .btn-ghost {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            background: var(--surface);
            color: var(--ink-60);
            border: 1px solid var(--ink-15);
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 13px;
            height: 34px;
            white-space: nowrap;
            transition: all 0.14s ease;
        }

        .btn-ghost svg { width: 11px; height: 11px; flex-shrink: 0; }

        .btn-ghost:hover {
            background: var(--surface-2);
            color: var(--ink);
            border-color: rgba(28,24,20,0.24);
        }

        .btn-ghost.success {
            background: rgba(46,110,74,0.08);
            border-color: rgba(46,110,74,0.28);
            color: var(--success);
        }

        .btn-ghost.error {
            background: rgba(168,50,50,0.08);
            border-color: rgba(168,50,50,0.28);
            color: var(--error);
        }

        /* Divider */
        .divider { height: 1px; background: var(--ink-08); margin: 0; }

        /* Gaps */
        .gap-sm { height: 14px; }
        .gap    { height: 18px; }

        /* Responsive */
        @media (max-width: 520px) {
            body { padding: 12px; align-items: flex-start; }
            .header { padding: 20px 20px 18px; }
            .controls {
                padding: 14px 20px;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto;
            }
            .btn-draw { grid-column: 1 / -1; height: 44px; }
            .words-wrap { padding: 0 20px; }
            .prompt-section { padding: 14px 20px 20px; }
            .badge { display: none; }
            .prompt-hint { display: none; }
        }
    </style>
</head>
<body>
<div class="card">

    <div class="header">
        <div>
            <div class="header-title">हिंदी शब्द संग्रह</div>
            <div class="header-sub">Word Collection</div>
        </div>
        <div class="badge" id="wordCountBadge"></div>
    </div>

    <div class="controls">

        <div class="spinner">
            <label for="wordCount">Words to draw</label>
            <input type="number" id="wordCount" min="1" max="10000" value="50">
            <div class="stepper">
                <button class="step-btn" id="wcUp" aria-label="More">
                    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5,3 8,7"/></svg>
                </button>
                <button class="step-btn" id="wcDown" aria-label="Less">
                    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3 5,7 8,3"/></svg>
                </button>
            </div>
        </div>

        <div class="spinner">
            <label for="totalWords">From most frequent</label>
            <input type="number" id="totalWords" min="500" max="30000" value="3000" step="500">
            <div class="stepper">
                <button class="step-btn" id="twUp" aria-label="More">
                    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5,3 8,7"/></svg>
                </button>
                <button class="step-btn" id="twDown" aria-label="Less">
                    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,3 5,7 8,3"/></svg>
                </button>
            </div>
        </div>

        <button id="randomBtn" class="btn-draw">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/>
                <path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/>
                <path d="m18 14 4 4-4 4"/>
                <path d="M21.8 18H18c-1.3 0-2.5-.6-3.3-1.7l-.1-.1"/>
            </svg>
            Draw
        </button>

    </div>

    <div class="gap-sm"></div>
    <div class="words-wrap">
        <div id="wordsContainer" class="words-strip">
            <div class="words-inner"><span class="words-placeholder">Draw words to begin</span></div>
            <div class="words-fade"></div>
        </div>
    </div>
    <div class="gap"></div>

    <div class="divider"></div>

    <div class="prompt-section">
        <div class="prompt-header">
            <span class="prompt-label">Learning Prompt</span>
            <span class="prompt-hint">Editable — paste into any AI chat</span>
        </div>
        <textarea id="promptText" placeholder="Draw words above to generate your learning prompt…"></textarea>
        <div class="copy-row">
            <button id="copyBtn" class="btn-ghost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                Copy words
            </button>
            <button id="copyPromptBtn" class="btn-ghost">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Copy prompt
            </button>
        </div>
    </div>

</div>
<script>
class HindiWordsApp {
    constructor() {
        this.allWords = [];
        this.currentWords = [];
        this.init();
    }

    async init() {
        this.cacheDOM();
        this.bindEvents();
        await this.loadAllWords();
    }

    cacheDOM() {
        this.wordCountInput  = document.getElementById('wordCount');
        this.totalWordsInput = document.getElementById('totalWords');
        this.randomBtn       = document.getElementById('randomBtn');
        this.copyBtn         = document.getElementById('copyBtn');
        this.copyPromptBtn   = document.getElementById('copyPromptBtn');
        this.wordsContainer  = document.getElementById('wordsContainer');
        this.promptText      = document.getElementById('promptText');
        this.wordCountBadge  = document.getElementById('wordCountBadge');
        this.wordsInner      = this.wordsContainer.querySelector('.words-inner');
    }

    bindEvents() {
        this.randomBtn.addEventListener('click', () => this.displayRandomWords());
        this.copyBtn.addEventListener('click', () => this.copyToClipboard());
        this.copyPromptBtn.addEventListener('click', () => this.copyPromptToClipboard());

        document.getElementById('wcUp').addEventListener('click', () => {
            this.wordCountInput.value = Math.min(+this.wordCountInput.value + 5, 10000);
        });
        document.getElementById('wcDown').addEventListener('click', () => {
            this.wordCountInput.value = Math.max(+this.wordCountInput.value - 5, 1);
        });
        document.getElementById('twUp').addEventListener('click', async () => {
            this.totalWordsInput.value = Math.min(+this.totalWordsInput.value + 500, 30000);
            await this.loadAllWords();
        });
        document.getElementById('twDown').addEventListener('click', async () => {
            this.totalWordsInput.value = Math.max(+this.totalWordsInput.value - 500, 500);
            await this.loadAllWords();
        });
        this.totalWordsInput.addEventListener('change', () => this.loadAllWords());
    }

    async loadAllWords() {
        try {
            const requested = Math.min(Math.max(parseInt(this.totalWordsInput.value) || 3000, 500), 30000);
            const filesNeeded = Math.ceil(requested / 3000);
            let loaded = [];
            for (let i = 1; i <= filesNeeded; i++) {
                const words = await this.fetchWords(`https://qyct.github.io/freq-hindi/words/hw${String(i).padStart(2,'0')}.txt`);
                loaded = loaded.concat(words);
            }
            this.allWords = loaded.slice(0, requested);
            if (this.wordCountBadge)
                this.wordCountBadge.textContent = this.allWords.length.toLocaleString() + ' words';
        } catch(e) {
            this.wordsInner.innerHTML = '<span class="words-error">Failed to load. Please refresh.</span>';
        }
    }

    async fetchWords(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error('fetch failed');
        const text = await res.text();
        return text.split('\n').filter(l => l.trim()).map(l => l.split(',')[0].trim()).filter(Boolean);
    }

    displayRandomWords() {
        if (!this.allWords.length) {
            this.wordsInner.innerHTML = '<span class="words-error">No words loaded yet.</span>';
            return;
        }
        const count = Math.min(parseInt(this.wordCountInput.value) || 50, this.allWords.length);
        this.currentWords = [...this.allWords].sort(() => Math.random() - 0.5).slice(0, count);
        this.renderWords();
    }

    renderWords() {
        if (!this.currentWords.length) {
            this.wordsInner.innerHTML = '<span class="words-placeholder">Draw words to begin</span>';
            this.wordsContainer.classList.remove('active');
            this.promptText.value = '';
            return;
        }
        const safe = this.currentWords.map(w => { const d = document.createElement('div'); d.textContent = w; return d.innerHTML; }).join(', ');
        this.wordsInner.innerHTML = `<span class="words-text">${safe}</span>`;
        this.wordsContainer.classList.add('active');
        this.promptText.value = `${this.currentWords.join(', ')}\n\nUsing these words, create meaningful paragraphs in Hindi with around 30 words, each can have multiple sentences, that help understand their usage in everyday conversations. Explain the meaning of each sentence of paragraphs in English, highlight grammar points, and suggest alternative ways to use these words naturally. Make it engaging so that one can practice speaking, reading, and writing Hindi.`;
    }

    copyToClipboard() {
        if (!this.currentWords.length) { this.feedback(this.copyBtn, 'No words!', false); return; }
        navigator.clipboard.writeText(this.currentWords.join(', '))
            .then(() => this.feedback(this.copyBtn, 'Copied!', true))
            .catch(() => this.feedback(this.copyBtn, 'Failed', false));
    }

    copyPromptToClipboard() {
        const text = this.promptText.value.trim();
        if (!text) { this.feedback(this.copyPromptBtn, 'No prompt!', false); return; }
        navigator.clipboard.writeText(text)
            .then(() => this.feedback(this.copyPromptBtn, 'Copied!', true))
            .catch(() => this.feedback(this.copyPromptBtn, 'Failed', false));
    }

    feedback(btn, msg, ok) {
        const orig = btn.innerHTML;
        const check = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px"><polyline points="20 6 9 17 4 12"/></svg>`;
        const cross = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
        btn.innerHTML = `${ok ? check : cross} ${msg}`;
        btn.classList.add(ok ? 'success' : 'error');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('success', 'error'); }, 2000);
    }
}
document.addEventListener('DOMContentLoaded', () => new HindiWordsApp());
</script>
</body>
</html>
