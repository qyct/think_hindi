<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिंदी शब्द संग्रह</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>हिंदी शब्द संग्रह</h1>
            <span class="subtitle">Word Collection</span>
        </header>

        <main>
            <div class="controls">
                <div class="input-group">
                    <label for="wordCount">Count</label>
                    <input type="number" id="wordCount" min="1" max="100" value="40">
                </div>

                <button id="randomBtn" class="btn-primary">
                    <span>🎲</span> Generate
                </button>

                <button id="copyBtn" class="btn-secondary">
                    <span>📋</span> Copy
                </button>

                <button id="copyPromptBtn" class="btn-secondary">
                    <span>💬</span> Copy with Prompt
                </button>
            </div>

            <div id="wordsContainer" class="words-container">
                <div class="placeholder">Click Generate to display Hindi words</div>
            </div>

            <div class="prompt-section">
                <label for="promptText">Learning Prompt</label>
                <textarea id="promptText" placeholder="Generate words to create a learning prompt..."></textarea>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
